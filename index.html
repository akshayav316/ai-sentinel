<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sentinel - System Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #533483 75%, #e94560 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Floating sparkles */
    .sparkle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkleFloat 8s infinite ease-in-out;
      box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.5);
    }

    @keyframes sparkleFloat {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Glowing cursor */
    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(147, 112, 219, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: opacity 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    /* Robot emoji animation */
    .robot {
      font-size: 80px;
      display: inline-block;
      animation: robotFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(147, 112, 219, 0.8));
      margin-bottom: 10px;
    }

    @keyframes robotFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .title {
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(147, 112, 219, 0.8), 0 0 60px rgba(147, 112, 219, 0.4);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 30px;
      font-weight: 300;
    }

    /* Glassmorphism chatbox */
    .chatbox {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 30px rgba(255, 255, 255, 0.05);
    }

    .chat-messages {
      height: 350px;
      overflow-y: auto;
      padding: 10px;
      text-align: left;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(147, 112, 219, 0.5);
      border-radius: 3px;
    }

    .message {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 12px;
      color: #fff;
      font-size: 0.95rem;
      line-height: 1.5;
      border-left: 3px solid #9370db;
      animation: messageSlide 0.4s ease-out;
      transition: all 0.3s ease;
    }

    .message:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(5px);
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .message.alert {
      background: rgba(233, 69, 96, 0.3);
      border-left-color: #e94560;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
    }

    .message.success {
      border-left-color: #4ade80;
    }

    .message.warning {
      background: rgba(251, 191, 36, 0.2);
      border-left-color: #fbbf24;
    }

    .message.info {
      border-left-color: #60a5fa;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255, 255, 255, 0.4);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 1rem;
    }

    /* Button styling */
    .check-btn {
      background: linear-gradient(135deg, #9370db 0%, #7c3aed 50%, #6366f1 100%);
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(147, 112, 219, 0.5);
      position: relative;
      overflow: hidden;
      letter-spacing: 1px;
    }

    .check-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .check-btn:hover::before {
      left: 100%;
    }

    .check-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(147, 112, 219, 0.7);
    }

    .check-btn:active {
      transform: translateY(-1px);
    }

    .check-btn:disabled {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .check-btn:disabled::before {
      display: none;
    }

    /* Sound toggle button */
    .sound-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .sound-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }

    .sound-toggle.muted {
      opacity: 0.5;
    }

    /* Typing cursor animation */
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #9370db;
      margin-left: 2px;
      animation: cursorBlink 0.8s infinite;
      vertical-align: text-bottom;
    }

    @keyframes cursorBlink {

      0%,
      50% {
        opacity: 1;
      }

      51%,
      100% {
        opacity: 0;
      }
    }

    /* Status indicator */
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-dot.active {
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
    }

    .status-dot.scanning {
      background: #fbbf24;
      box-shadow: 0 0 10px #fbbf24;
    }

    .status-dot.idle {
      background: #6b7280;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    /* Progress indicator */
    .progress-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .progress-container.active {
      opacity: 1;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #9370db, #7c3aed, #6366f1);
      width: 0%;
      transition: width 0.5s ease;
      border-radius: 2px;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .title {
        font-size: 2rem;
      }

      .robot {
        font-size: 60px;
      }

      .chatbox {
        padding: 16px;
      }

      .chat-messages {
        height: 280px;
      }

      .check-btn {
        padding: 14px 32px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <!-- Cursor glow effect -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- Sound toggle -->
  <button class="sound-toggle" id="soundToggle" title="Toggle voice">🔊</button>

  <div class="container">
    <!-- Animated robot -->
    <div class="robot">🤖</div>

    <!-- Title and subtitle -->
    <h1 class="title">AI Sentinel</h1>
    <p class="subtitle">Simulated AI-based system monitoring dashboard</p>

    <!-- Glassmorphism chatbox -->
    <div class="chatbox">
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">📡</div>
          <div class="empty-state-text">Ready to scan your systems</div>
        </div>
      </div>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- Check system button -->
    <button class="check-btn" id="checkBtn">🔍 Check System</button>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot idle" id="statusDot"></div>
        <span id="statusText">System Idle</span>
      </div>
    </div>
  </div>

  <script>
    // ==================== Configuration ====================
    const CONFIG = {
      typingSpeed: 35,
      messageDelay: 1200,
      voiceEnabled: true,
      voiceRate: 1.0,
      voicePitch: 1.0
    };

    // ==================== DOM Elements ====================
    const chatMessages = document.getElementById('chatMessages');
    const checkBtn = document.getElementById('checkBtn');
    const soundToggle = document.getElementById('soundToggle');
    const cursorGlow = document.getElementById('cursorGlow');
    const emptyState = document.getElementById('emptyState');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    // ==================== State ====================
    let isScanning = false;
    let voiceEnabled = true;

    // ==================== System Messages ====================
    const systemMessages = [
      {
        text: "Alright, I'm spinning up the diagnostic routines now...",
        type: 'info',
        progress: 10
      },
      {
        text: "Running system diagnostics... Checking core processes and memory allocation.",
        type: 'info',
        progress: 25
      },
      {
        text: "Now let me take a look at your API connections...",
        type: 'info',
        progress: 40
      },
      {
        text: "✅ Weather API: Working perfectly! Response times are looking great.",
        type: 'success',
        progress: 55
      },
      {
        text: "⚠️ Payment API: Hmm, I'm detecting some unusual latency here. There might be an issue on their end.",
        type: 'alert',
        progress: 70
      },
      {
        text: "💡 Suggested fix: I'd recommend implementing a retry mechanism or switching to your fallback payment service temporarily.",
        type: 'warning',
        progress: 80
      },
      {
        text: "✅ Maps API: Running smoothly with excellent uptime. No concerns there!",
        type: 'success',
        progress: 90
      },
      {
        text: "📊 Scan complete! Overall system health: 87%. One issue needs your attention.",
        type: 'info',
        progress: 100
      }
    ];

    // ==================== Sparkle Creation ====================
    function createSparkles() {
      const sparkleCount = 30;

      for (let i = 0; i < sparkleCount; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + 'vw';
        sparkle.style.animationDelay = Math.random() * 8 + 's';
        sparkle.style.animationDuration = (6 + Math.random() * 4) + 's';
        document.body.appendChild(sparkle);
      }
    }

    // ==================== Cursor Glow Effect ====================
    function initCursorGlow() {
      document.addEventListener('mousemove', (e) => {
        cursorGlow.style.left = e.clientX + 'px';
        cursorGlow.style.top = e.clientY + 'px';
      });

      document.addEventListener('mouseleave', () => {
        cursorGlow.style.opacity = '0';
      });

      document.addEventListener('mouseenter', () => {
        cursorGlow.style.opacity = '1';
      });
    }

    // ==================== Speech Synthesis ====================
    function speak(text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) return;

      // Cancel any ongoing speech
      window.speechSynthesis.cancel();

      // Clean text for speech (remove emojis)
      const cleanText = text.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|✅|❌|⚠️|💡|📊|📡|🔍/gu, '').trim();

      if (!cleanText) return;

      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.rate = CONFIG.voiceRate;
      utterance.pitch = CONFIG.voicePitch;

      // Try to get a good voice
      const voices = window.speechSynthesis.getVoices();
      const preferredVoice = voices.find(v =>
        v.name.includes('Google') ||
        v.name.includes('Samantha') ||
        v.lang.startsWith('en')
      );

      if (preferredVoice) {
        utterance.voice = preferredVoice;
      }

      window.speechSynthesis.speak(utterance);
    }

    // ==================== Typing Effect ====================
    function typeMessage(element, text, callback) {
      let index = 0;
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';
      element.appendChild(cursor);

      function type() {
        if (index < text.length) {
          // Insert character before cursor
          cursor.before(document.createTextNode(text.charAt(index)));
          index++;
          setTimeout(type, CONFIG.typingSpeed);
        } else {
          // Remove cursor and call callback
          cursor.remove();
          if (callback) callback();
        }
      }

      type();
    }

    // ==================== Add Message ====================
    function addMessage(text, type = 'info') {
      return new Promise((resolve) => {
        // Hide empty state if visible
        if (emptyState) {
          emptyState.style.display = 'none';
        }

        // Create message element
        const messageEl = document.createElement('div');
        messageEl.className = `message ${type}`;
        chatMessages.appendChild(messageEl);

        // Scroll to bottom
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Type the message
        typeMessage(messageEl, text, () => {
          // Speak after typing completes
          speak(text);
          resolve();
        });
      });
    }

    // ==================== Update Progress ====================
    function updateProgress(percent) {
      progressBar.style.width = percent + '%';
    }

    // ==================== Update Status ====================
    function updateStatus(status, text) {
      statusDot.className = 'status-dot ' + status;
      statusText.textContent = text;
    }

    // ==================== Run System Check ====================
    async function runSystemCheck() {
      if (isScanning) return;

      isScanning = true;
      checkBtn.disabled = true;
      checkBtn.textContent = '⏳ Scanning...';

      // Show progress bar
      progressContainer.classList.add('active');
      updateProgress(0);
      updateStatus('scanning', 'Scanning Systems...');

      // Process each message
      for (let i = 0; i < systemMessages.length; i++) {
        const msg = systemMessages[i];

        await addMessage(msg.text, msg.type);
        updateProgress(msg.progress);

        // Wait between messages
        if (i < systemMessages.length - 1) {
          await new Promise(resolve => setTimeout(resolve, CONFIG.messageDelay));
        }
      }

      // Complete
      updateStatus('active', 'Scan Complete');
      checkBtn.disabled = false;
      checkBtn.textContent = '🔄 Run Again';
      isScanning = false;

      // Hide progress bar after a moment
      setTimeout(() => {
        progressContainer.classList.remove('active');
        updateProgress(0);
      }, 2000);
    }

    // ==================== Clear Chat ====================
    function clearChat() {
      // Remove all messages but keep empty state
      const messages = chatMessages.querySelectorAll('.message');
      messages.forEach(msg => msg.remove());

      // Show empty state
      if (emptyState) {
        emptyState.style.display = 'flex';
      }

      updateStatus('idle', 'System Idle');
    }

    // ==================== Toggle Sound ====================
    function toggleSound() {
      voiceEnabled = !voiceEnabled;
      soundToggle.textContent = voiceEnabled ? '🔊' : '🔇';
      soundToggle.classList.toggle('muted', !voiceEnabled);

      if (!voiceEnabled) {
        window.speechSynthesis.cancel();
      }
    }

    // ==================== Event Listeners ====================
    checkBtn.addEventListener('click', () => {
      if (!isScanning) {
        clearChat();
        runSystemCheck();
      }
    });

    soundToggle.addEventListener('click', toggleSound);

    // Load voices (needed for some browsers)
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }

    // ==================== Initialize ====================
    function init() {
      createSparkles();
      initCursorGlow();

      // Check for speech synthesis support
      if (!('speechSynthesis' in window)) {
        soundToggle.style.display = 'none';
        console.log('Speech synthesis not supported');
      }
    }

    // Run initialization
    init();
  </script>
</body>

</html>
